version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: postgres-test-db
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=StrongPassword123!
      - POSTGRES_DB=testdb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d testdb"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

volumes:
  postgres_data:
